<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bear Testing Zone</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #fff3d6, #dff7ff);
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 255, 255, 0.86);
      border-radius: 28px;
      padding: 42px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(31, 41, 55, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }
    .bear {
      width: 180px;
      height: 180px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #9a6a3a;
      position: relative;
      box-shadow: inset 0 -14px 0 rgba(0,0,0,0.08);
      animation: bounce 2.4s ease-in-out infinite;
    }
    .bear:before, .bear:after {
      content: "";
      position: absolute;
      width: 58px;
      height: 58px;
      background: #9a6a3a;
      border-radius: 50%;
      top: 0;
    }
    .bear:before { left: 4px; }
    .bear:after { right: 4px; }
    .face {
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      width: 98px;
      height: 78px;
      background: #f3d2a2;
      border-radius: 45% 45% 50% 50%;
    }
    .eye {
      position: absolute;
      width: 13px;
      height: 13px;
      background: #111827;
      border-radius: 50%;
      top: 50px;
    }
    .eye.left { left: 55px; }
    .eye.right { right: 55px; }
    .nose {
      position: absolute;
      width: 24px;
      height: 18px;
      background: #111827;
      border-radius: 50%;
      left: 50%;
      top: 82px;
      transform: translateX(-50%);
    }
    .smile {
      position: absolute;
      width: 44px;
      height: 20px;
      border-bottom: 4px solid #111827;
      border-radius: 0 0 50px 50px;
      left: 50%;
      top: 98px;
      transform: translateX(-50%);
    }
    h1 {
      font-size: clamp(38px, 6vw, 72px);
      margin: 12px 0;
      letter-spacing: -2px;
    }
    .tagline {
      font-size: 22px;
      line-height: 1.5;
      max-width: 620px;
      margin: 0 auto 28px;
    }
    .pill {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-weight: 700;
      margin: 6px;
    }
    .footer {
      margin-top: 28px;
      font-size: 16px;
      opacity: 0.75;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="bear">
      <div class="face"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
      <div class="smile"></div>
    </div>
    <h1>Bear Testing Zone</h1>
    <p class="tagline">A tiny fun website to prove GitHub hosting works. Built for testing, smiling, and mild bear powered chaos.</p>
    <div>
      <span class="pill">GitHub Ready</span>
      <span class="pill">Static Site</span>
      <span class="pill">Bear Approved</span>
    </div>
    <p class="footer">Created for Kedar Mohile. This bear is officially on duty.</p>
  </main>
</body>
</html>
